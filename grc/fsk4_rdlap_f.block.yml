id: fsk4_rdlap_f
label: FSK4 RDLAP F
category: '[FSK4]'
flags: [ python ]

parameters:
-   id: queue
    label: Message Queue
    dtype: raw
    default: gr.msg_queue(2)
-   id: processing_flags
    label: Processing Flags
    dtype: int
    default: '0'

inputs:
-   domain: stream
    dtype: float

templates:
    imports: |-
        from gnuradio import gr
        from gnuradio import fsk4
    make: fsk4.rdlap_f(${queue}, ${processing_flags})

documentation: |-
    RDLAP frame decoder for FSK4 symbols.

file_format: 1
